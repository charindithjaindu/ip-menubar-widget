name: WhatsMyIP
options:
  bundleIdPrefix: com.whatsmyip
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: "$(TARGET_NAME)"

targets:
  WhatsMyIP:
    type: application
    platform: macOS
    sources:
      - Sources/App
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whatsmyip.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: "What's My IP"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: IPWidgetExtension
        embed: true

  IPWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - Sources/Widget
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whatsmyip.app.IPWidget
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/Widget/IPWidget.entitlements
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: My IP Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
